<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字RPG - Ex5 專案</title>
    <style>
        :root {
            --bg-color: #f4f4f9; --text-color: #333; --border-color: #ccc;
            --primary-color: #0056b3; --btn-bg: #e0e0e0; --danger-color: #dc3545;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 0; display: flex; justify-content: center;
        }
        #game-container {
            width: 100%; max-width: 600px; background: white;
            min-height: 100vh; border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color); padding: 20px; box-sizing: border-box;
            position: relative;
        }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1, h2, h3 { text-align: center; }
        .menu-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            font-size: 16px; background-color: var(--btn-bg);
            border: 1px solid var(--border-color); border-radius: 5px; cursor: pointer;
        }
        .menu-btn:hover { background-color: #d0d0d0; }
        .btn-combat { border-left: 5px solid #dc3545; }
        .btn-event { border-left: 5px solid #28a745; }
        .btn-boss { border-left: 5px solid #6f42c1; background-color: #f3e8ff; }
        
        .stats-box { border: 1px solid var(--border-color); padding: 10px; margin-bottom: 15px; border-radius: 5px; background: #fafafa; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-weight: bold; }
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .nav-tabs button { flex: 1; margin: 0 5px; padding: 8px; }
        
        .point-allocator { display: flex; align-items: center; margin: 10px 0; justify-content: space-between; }
        .point-allocator button { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #aaa; cursor: pointer; font-size: 18px; }
        
        .log-box { height: 180px; overflow-y: auto; border: 1px solid var(--border-color); padding: 10px; background: #222; color: #0f0; font-family: monospace; font-size: 14px; margin-bottom: 15px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { padding: 15px; font-size: 16px; border-radius: 5px; cursor: pointer; border: 1px solid #999; }
        
        .char-card { border: 1px solid var(--border-color); padding: 10px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        .char-card.selected { border-color: var(--primary-color); background-color: #e6f2ff; border-width: 2px; }
        
        #records-list { max-height: 400px; overflow-y: auto; }
        .record-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        
        .turn-header { text-align: center; font-size: 1.2em; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 標題介面 -->
    <div id="screen-title" class="screen active">
        <h1>文字RPG</h1>
        <button class="menu-btn" onclick="app.navigate('screen-mode')">開始遊戲</button>
        <button class="menu-btn" onclick="app.showRecords()">遊玩紀錄</button>
    </div>

    <!-- 遊玩紀錄 -->
    <div id="screen-records" class="screen">
        <h2>遊玩紀錄</h2>
        <div id="records-list" class="stats-box"></div>
        <button class="menu-btn" onclick="app.navigate('screen-title')">返回</button>
    </div>

    <!-- 模式選擇 -->
    <div id="screen-mode" class="screen">
        <h2>選擇遊戲模式</h2>
        <button class="menu-btn" onclick="app.selectMode('fixed')">固定回合模式 (最多20回合，通關2次Boss)</button>
        <button class="menu-btn" onclick="app.selectMode('endless')">無限模式 (戰鬥直到生命歸零)</button>
        <button class="menu-btn" onclick="app.navigate('screen-title')">返回標題</button>
    </div>

    <!-- 角色選擇 -->
    <div id="screen-char" class="screen">
        <h2>選擇初始角色</h2>
        <div id="char-selection-list"></div>
        <button class="menu-btn" onclick="app.startGame()" style="background-color: #d4edda; margin-top: 20px; font-size: 1.2em;">開始旅程</button>
        <button class="menu-btn" onclick="app.navigate('screen-mode')">上一頁</button>
    </div>

    <!-- 遊戲主介面 (事件選擇) -->
    <div id="screen-hub" class="screen">
        <div class="turn-header">當前進度：第 <span id="hub-turn"></span> 回合</div>
        <div class="stats-box" id="player-hud"></div>
        
        <div class="nav-tabs">
            <button onclick="app.switchHubTab('events')">事件</button>
            <button onclick="app.switchHubTab('points')">天賦</button>
            <button onclick="app.switchHubTab('inventory')">背包/裝備</button>
        </div>
        
        <!-- 事件分頁 -->
        <div id="tab-events" class="tab-content">
            <h3>選擇一項事件挑戰：</h3>
            <div id="event-choices"></div>
        </div>

        <!-- 天賦分頁 -->
        <div id="tab-points" class="tab-content" style="display:none;">
            <h3 style="color: var(--primary-color);">剩餘天賦點: <span id="talent-points"></span></h3>
            <div class="point-allocator"><span>生命 (HP +20)</span> <button onclick="app.upgradeStat('maxHp')">+</button></div>
            <div class="point-allocator"><span>魔力 (MP +10)</span> <button onclick="app.upgradeStat('maxMp')">+</button></div>
            <div class="point-allocator"><span>攻擊 (ATK +3)</span> <button onclick="app.upgradeStat('atk')">+</button></div>
            <div class="point-allocator"><span>防禦 (DEF +2)</span> <button onclick="app.upgradeStat('def')">+</button></div>
        </div>

        <!-- 背包分頁 -->
        <div id="tab-inventory" class="tab-content" style="display:none;">
            <h3>裝備與法杖</h3>
            <div id="inv-equip" class="stats-box"></div>
            <h3>道具 (點擊使用)</h3>
            <div id="inv-items"></div>
        </div>
    </div>

    <!-- 戰鬥介面 -->
    <div id="screen-combat" class="screen">
        <h2 id="combat-title" class="turn-header">戰鬥事件</h2>
        <div class="stats-box" id="combat-hud"></div>
        
        <div class="stats-box" style="border-color: #dc3545; background-color: #fff5f5;">
            <div class="stat-row"><span id="enemy-name" style="color: #dc3545; font-size: 1.2em;"></span></div>
            <div class="stat-row"><span>HP: <span id="enemy-hp"></span></span> <span>ATK: <span id="enemy-atk"></span> | DEF: <span id="enemy-def"></span></span></div>
        </div>

        <div class="log-box" id="combat-log"></div>

        <div class="action-grid" id="combat-actions">
            <button class="action-btn" onclick="app.combatAction('sword')" style="background-color: #e2e3e5;">⚔️ 劍術攻擊<br><small>受防禦減免</small></button>
            <button class="action-btn" onclick="app.combatAction('magic')" style="background-color: #cce5ff;">🪄 法術攻擊<br><small>消耗 10 MP</small></button>
            <button class="action-btn" onclick="app.useItemInCombat()" style="background-color: #d4edda;">🎒 使用道具<br><small>輔助通關</small></button>
            <button class="action-btn" onclick="app.combatAction('flee')" style="background-color: #f8d7da;">🏃 逃跑<br><small>事件失敗</small></button>
        </div>
        <button id="btn-combat-continue" class="menu-btn" style="display:none; background-color: #d4edda;" onclick="app.endEvent()">繼續旅程</button>
    </div>

    <!-- 結算介面 -->
    <div id="screen-result" class="screen">
        <h1 id="result-title">遊戲結束</h1>
        <div class="stats-box">
            <p>遊玩模式: <span id="res-mode"></span></p>
            <p>使用角色: <span id="res-char"></span></p>
            <p>存活回合: <span id="res-turn"></span></p>
            <hr>
            <h3>最終結算分數: <span id="res-score" style="color: var(--primary-color); font-size: 1.5em;"></span></h3>
        </div>
        <button class="menu-btn" onclick="app.navigate('screen-title')">返回標題介面</button>
    </div>
</div>

<script>
/**
 * 遊戲資料設定
 */
const CHARACTERS = [
    { id: 'warrior', name: '戰士', maxHp: 150, hp: 150, maxMp: 30, mp: 30, atk: 15, def: 10, weapon: '生鏽鐵劍', equip: '舊皮甲', staff: '木短杖', ability: '提升基礎數值 (高生命/高防禦)', startItem: null },
    { id: 'mage', name: '法師', maxHp: 80, hp: 80, maxMp: 100, mp: 100, atk: 8, def: 4, weapon: '小匕首', equip: '布衣', staff: '學徒法杖', ability: '攜帶初始道具 (魔力藥水x3)', startItem: {name: '魔力藥水', type: 'recover', effect: {mp: 30}, count: 3} },
    { id: 'rogue', name: '斥候', maxHp: 100, hp: 100, maxMp: 50, mp: 50, atk: 12, def: 6, weapon: '獵刀', equip: '輕盈披風', staff: '無', ability: '其他能力 (自帶煙霧彈可跳過戰鬥)', startItem: {name: '煙霧彈', type: 'assist', count: 1} }
];

/**
 * 玩家類別
 */
class Player {
    constructor(charData) {
        Object.assign(this, JSON.parse(JSON.stringify(charData))); // 深拷貝
        this.lv = 1;
        this.exp = 0;
        this.expNeeded = 100;
        this.points = 0;
        this.score = 0;
        this.items = [];
        if (this.startItem) this.items.push(this.startItem);
    }

    gainExp(amount) {
        this.exp += amount;
        let leveledUp = false;
        while (this.exp >= this.expNeeded) {
            this.exp -= this.expNeeded;
            this.lv++;
            this.points++;
            this.expNeeded = Math.floor(this.expNeeded * 1.5);
            this.maxHp += 10; this.hp = this.maxHp;
            this.maxMp += 5; this.mp = this.maxMp;
            leveledUp = true;
        }
        return leveledUp;
    }

    useItem(index, context = 'hub') {
        const item = this.items[index];
        if (!item) return false;

        if (item.type === 'recover') {
            if (item.effect.hp) this.hp = Math.min(this.maxHp, this.hp + item.effect.hp);
            if (item.effect.mp) this.mp = Math.min(this.maxMp, this.mp + item.effect.mp);
        } else if (item.type === 'assist' && context === 'combat') {
            // 輔助過關道具 (例如煙霧彈直接秒殺一般怪)
            return 'assist_used';
        } else if (item.type === 'assist' && context === 'hub') {
            return false; // 戰鬥輔助道具無法在非戰鬥使用
        }

        item.count--;
        if (item.count <= 0) this.items.splice(index, 1);
        return true;
    }
}

/**
 * 遊戲主控核心
 */
class GameApp {
    constructor() {
        this.state = { mode: '', selectedCharId: 'warrior', turn: 1, isBossTurn: false };
        this.player = null;
        this.currentEnemy = null;
        this.initCharSelection();
    }

    // --- UI 導航 ---
    navigate(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    selectMode(mode) {
        this.state.mode = mode;
        this.navigate('screen-char');
    }

    switchHubTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(`tab-${tabId}`).style.display = 'block';
        this.updateHUD();
    }

    // --- 初始化 ---
    initCharSelection() {
        const container = document.getElementById('char-selection-list');
        container.innerHTML = '';
        CHARACTERS.forEach(char => {
            const div = document.createElement('div');
            div.className = `char-card ${this.state.selectedCharId === char.id ? 'selected' : ''}`;
            div.innerHTML = `
                <h3 style="margin:0 0 5px 0; color:var(--primary-color)">${char.name}</h3>
                <div style="font-size:0.9em; margin-bottom:5px;"><b>能力：</b>${char.ability}</div>
                <div class="stat-row"><span>HP: ${char.maxHp}</span> <span>MP: ${char.maxMp}</span></div>
                <div class="stat-row"><span>ATK: ${char.atk}</span> <span>DEF: ${char.def}</span></div>
            `;
            div.onclick = () => {
                this.state.selectedCharId = char.id;
                this.initCharSelection(); // 重新渲染以更新外框
            };
            container.appendChild(div);
        });
    }

    startGame() {
        const charData = CHARACTERS.find(c => c.id === this.state.selectedCharId);
        this.player = new Player(charData);
        this.state.turn = 1;
        this.generateEvents();
        this.navigate('screen-hub');
    }

    // --- HUD 更新 ---
    updateHUD() {
        const renderHUD = (containerId) => {
            const p = this.player;
            document.getElementById(containerId).innerHTML = `
                <div class="stat-row"><span>等級: ${p.lv}</span> <span>經驗: ${p.exp}/${p.expNeeded}</span> <span>分數: ${p.score}</span></div>
                <div class="stat-row"><span style="color:#d32f2f">HP: ${p.hp}/${p.maxHp}</span> <span style="color:#1976d2">MP: ${p.mp}/${p.maxMp}</span></div>
                <div class="stat-row"><span>ATK: ${p.atk}</span> <span>DEF: ${p.def}</span></div>
            `;
        };
        if(document.getElementById('screen-hub').classList.contains('active')) renderHUD('player-hud');
        if(document.getElementById('screen-combat').classList.contains('active')) renderHUD('combat-hud');
        
        document.getElementById('hub-turn').innerText = this.state.turn;
        document.getElementById('talent-points').innerText = this.player.points;
        this.renderInventory();
    }

    renderInventory() {
        // 裝備
        document.getElementById('inv-equip').innerHTML = `
            <p><b>武器:</b> ${this.player.weapon}</p>
            <p><b>法杖:</b> ${this.player.staff}</p>
            <p><b>裝備:</b> ${this.player.equip}</p>
        `;
        // 道具
        const itemBox = document.getElementById('inv-items');
        itemBox.innerHTML = '';
        if (this.player.items.length === 0) itemBox.innerHTML = '<p>背包空空如也</p>';
        this.player.items.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            let desc = item.type === 'recover' ? '(回復)' : '(輔助/戰鬥中用)';
            btn.innerText = `${item.name} x${item.count} ${desc}`;
            btn.onclick = () => {
                if(this.player.useItem(index, 'hub')) {
                    alert(`使用了 ${item.name}`);
                    this.updateHUD();
                } else {
                    alert('該道具無法在此時使用。');
                }
            };
            itemBox.appendChild(btn);
        });
    }

    // --- 天賦配點 ---
    upgradeStat(stat) {
        if (this.player.points <= 0) { alert('天賦點不足！'); return; }
        this.player.points--;
        if (stat === 'maxHp') { this.player.maxHp += 20; this.player.hp += 20; }
        if (stat === 'maxMp') { this.player.maxMp += 10; this.player.mp += 10; }
        if (stat === 'atk') this.player.atk += 3;
        if (stat === 'def') this.player.def += 2;
        this.updateHUD();
    }

    // --- 事件系統 ---
    generateEvents() {
        this.updateHUD();
        this.switchHubTab('events');
        const container = document.getElementById('event-choices');
        container.innerHTML = '';
        
        // Boss 戰檢測 (第10回合、第20回合)
        if (this.state.turn % 10 === 0) {
            this.state.isBossTurn = true;
            let bossLevel = this.state.turn / 10;
            const btn = document.createElement('button');
            btn.className = 'menu-btn btn-boss';
            btn.innerHTML = `⚠️ 第 ${this.state.turn} 回合 Boss 戰 ⚠️<br><small>無法避開的宿命對決</small>`;
            btn.onclick = () => this.startCombat(true, bossLevel);
            container.appendChild(btn);
            return;
        }

        this.state.isBossTurn = false;
        // 隨機產生3個事件 (戰鬥/非戰鬥)
        for (let i = 0; i < 3; i++) {
            const isCombat = Math.random() > 0.4; // 60% 機率是戰鬥
            const btn = document.createElement('button');
            
            if (isCombat) {
                btn.className = 'menu-btn btn-combat';
                btn.innerHTML = `⚔️ 戰鬥事件<br><small>遭遇魔物，擊敗可獲得豐厚獎勵</small>`;
                btn.onclick = () => this.startCombat(false);
            } else {
                btn.className = 'menu-btn btn-event';
                const eventTypes = [
                    { t: 'item', desc: '發現寶箱', logic: () => this.rewardItem() },
                    { t: 'upgrade', desc: '遇到鐵匠', logic: () => this.upgradeGear() }
                ];
                const ev = eventTypes[Math.floor(Math.random() * eventTypes.length)];
                btn.innerHTML = `✨ 非戰鬥事件<br><small>${ev.desc}</small>`;
                btn.onclick = () => {
                    ev.logic();
                    this.player.score += 50;
                    alert(`完成非戰鬥事件！獲得 50 分。`);
                    this.endEvent();
                };
            }
            container.appendChild(btn);
        }
    }

    // 非戰鬥獎勵邏輯
    rewardItem() {
        const pool = [
            {name: '生命藥水', type: 'recover', effect: {hp: 50}, count: 1},
            {name: '魔力藥水', type: 'recover', effect: {mp: 30}, count: 1},
            {name: '閃光彈', type: 'assist', count: 1} // 幫助通關
        ];
        const loot = pool[Math.floor(Math.random() * pool.length)];
        let exist = this.player.items.find(i => i.name === loot.name);
        if(exist) exist.count++;
        else this.player.items.push(JSON.parse(JSON.stringify(loot)));
        alert(`打開寶箱，獲得了：${loot.name}！`);
    }

    upgradeGear() {
        const r = Math.random();
        if (r < 0.33) { this.player.weapon = '強化' + this.player.weapon; this.player.atk += 3; alert('武器升級！攻擊力提升。'); }
        else if (r < 0.66) { this.player.equip = '強化' + this.player.equip; this.player.def += 2; alert('裝備升級！防禦力提升。'); }
        else { this.player.staff = '強化' + this.player.staff; this.player.maxMp += 10; this.player.mp += 10; alert('法杖升級！最大魔力提升。'); }
    }

    // --- 戰鬥系統 ---
    startCombat(isBoss, bossLevel = 1) {
        this.navigate('screen-combat');
        document.getElementById('combat-log').innerHTML = '戰鬥開始！<br>';
        document.getElementById('combat-actions').style.display = 'grid';
        document.getElementById('btn-combat-continue').style.display = 'none';

        const scale = this.state.turn;
        if (isBoss) {
            document.getElementById('combat-title').innerText = "⚠️ BOSS 戰 ⚠️";
            this.currentEnemy = {
                name: bossLevel === 1 ? '石像鬼' : '黑龍王',
                isBoss: true,
                maxHp: 200 * bossLevel, hp: 200 * bossLevel,
                atk: 25 * bossLevel, def: 8 * bossLevel, exp: 100 * bossLevel, score: 500 * bossLevel
            };
        } else {
            document.getElementById('combat-title').innerText = "戰鬥事件";
            this.currentEnemy = {
                name: ['史萊姆', '哥布林', '野狼'][Math.floor(Math.random() * 3)] + ` Lv.${scale}`,
                isBoss: false,
                maxHp: 40 + scale * 10, hp: 40 + scale * 10,
                atk: 10 + scale * 2, def: 2 + scale, exp: 30 + scale * 5, score: 100 + scale * 10
            };
        }
        this.updateEnemyUI();
        this.updateHUD();
    }

    updateEnemyUI() {
        const e = this.currentEnemy;
        document.getElementById('enemy-name').innerText = e.name;
        document.getElementById('enemy-hp').innerText = `${e.hp}/${e.maxHp}`;
        document.getElementById('enemy-atk').innerText = e.atk;
        document.getElementById('enemy-def').innerText = e.def;
    }

    logCombat(msg) {
        const log = document.getElementById('combat-log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    combatAction(type) {
        const enemy = this.currentEnemy;
        let dmgToEnemy = 0;

        // 玩家回合
        if (type === 'sword') {
            dmgToEnemy = Math.max(1, this.player.atk - enemy.def); // 劍術受防禦減免
            this.logCombat(`使用【劍術】，造成 ${dmgToEnemy} 點傷害。(遭減免 ${enemy.def} 點)`);
        } else if (type === 'magic') {
            if (this.player.mp < 10) {
                this.logCombat('<span style="color:red">魔力不足，無法使用法術！</span>');
                return;
            }
            this.player.mp -= 10;
            dmgToEnemy = Math.max(1, Math.floor(this.player.atk * 1.8)); // 法術高倍率且無視部分防禦
            this.logCombat(`詠唱【法術】，消耗 10 MP，造成 ${dmgToEnemy} 點強效傷害！`);
        } else if (type === 'flee') {
            if (enemy.isBoss) {
                this.logCombat('<span style="color:red">無法逃離 Boss 戰！</span>'); return;
            }
            this.logCombat('你逃跑了... 錯失了獎勵。');
            this.combatEnd(false, true);
            return;
        }

        enemy.hp -= dmgToEnemy;
        if (enemy.hp <= 0) {
            enemy.hp = 0;
            this.updateEnemyUI();
            this.logCombat(`<span style="color:#28a745">擊敗了 ${enemy.name}！</span>`);
            this.combatEnd(true, false);
            return;
        }

        // 敵人回合
        let dmgToPlayer = Math.max(1, enemy.atk - this.player.def);
        this.player.hp -= dmgToPlayer;
        this.logCombat(`<span style="color:#dc3545">${enemy.name} 攻擊，對你造成 ${dmgToPlayer} 點傷害。</span>`);
        
        this.updateEnemyUI();
        this.updateHUD();

        if (this.player.hp <= 0) {
            this.player.hp = 0;
            this.updateHUD();
            this.gameOver();
        }
    }

    useItemInCombat() {
        const itemIdx = this.player.items.findIndex(i => i.type === 'assist');
        if (itemIdx === -1) {
            this.logCombat("背包中沒有可用的【輔助道具】！");
            return;
        }
        
        const item = this.player.items[itemIdx];
        if (this.currentEnemy.isBoss) {
             this.logCombat(`對 Boss 使用 ${item.name} 無效！`);
             return;
        }

        this.player.useItem(itemIdx, 'combat');
        this.logCombat(`使用了【${item.name}】，干擾了敵人，直接通過事件！`);
        this.combatEnd(true, false, true); // true = skip rewards partially
    }

    combatEnd(isWin, isFlee, usedItem = false) {
        document.getElementById('combat-actions').style.display = 'none';
        document.getElementById('btn-combat-continue').style.display = 'block';
        
        if (isWin && !isFlee) {
            const exp = usedItem ? Math.floor(this.currentEnemy.exp / 2) : this.currentEnemy.exp;
            const score = usedItem ? Math.floor(this.currentEnemy.score / 2) : this.currentEnemy.score;
            this.player.score += score;
            const lvlUp = this.player.gainExp(exp);
            
            this.logCombat(`獲得 ${exp} 經驗值，${score} 分數。`);
            if (lvlUp) this.logCombat('<span style="color:gold">🌟 升級了！獲得 1 點天賦點。</span>');
            
            // 戰鬥隨機掉落裝備或道具
            if (Math.random() > 0.5 && !usedItem) this.rewardItem();
        }
        this.updateHUD();
    }

    // --- 回合/結束流程 ---
    endEvent() {
        this.state.turn++;
        
        // 固定模式檢查：通過兩次 Boss (第21回合開始前) 即結束
        if (this.state.mode === 'fixed' && this.state.turn > 20) {
            this.gameOver(true);
            return;
        }
        this.generateEvents();
        this.navigate('screen-hub');
    }

    gameOver(isWin = false) {
        this.navigate('screen-result');
        document.getElementById('result-title').innerText = isWin ? "恭喜通關！" : "你倒下了...";
        
        let finalScore = this.player.score;
        // 根據 PDF 需求：結束後會根據剩餘生命與剩餘輔助道具和分數來計算
        if (this.state.mode === 'fixed' && isWin) {
            const itemBonus = this.player.items.filter(i => i.type === 'assist').length * 100;
            const hpBonus = this.player.hp * 2;
            finalScore += (itemBonus + hpBonus);
        }

        document.getElementById('res-mode').innerText = this.state.mode === 'fixed' ? '固定回合模式' : '無限模式';
        document.getElementById('res-char').innerText = CHARACTERS.find(c => c.id === this.state.selectedCharId).name;
        document.getElementById('res-turn').innerText = this.state.turn;
        document.getElementById('res-score').innerText = finalScore;

        this.saveRecord(finalScore);
    }

    // --- 存檔與紀錄 ---
    saveRecord(score) {
        const record = {
            date: new Date().toLocaleString(),
            mode: this.state.mode === 'fixed' ? '固定回合' : '無限',
            char: CHARACTERS.find(c => c.id === this.state.selectedCharId).name,
            score: score
        };
        let records = JSON.parse(localStorage.getItem('rpg_records') || '[]');
        records.unshift(record); // 加到最前面
        localStorage.setItem('rpg_records', JSON.stringify(records));
    }

    showRecords() {
        this.navigate('screen-records');
        const list = document.getElementById('records-list');
        const records = JSON.parse(localStorage.getItem('rpg_records') || '[]');
        
        if (records.length === 0) {
            list.innerHTML = '<p style="text-align:center;">暫無遊玩紀錄</p>';
            return;
        }
        
        list.innerHTML = records.map(r => `
            <div class="record-item">
                <div><b>時間:</b> ${r.date}</div>
                <div class="stat-row">
                    <span><b>模式:</b> ${r.mode}</span>
                    <span><b>角色:</b> ${r.char}</span>
                    <span style="color:var(--primary-color)"><b>分數:</b> ${r.score}</span>
                </div>
            </div>
        `).join('');
    }
}

// 啟動遊戲
const app = new GameApp();
</script>
