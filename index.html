<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字RPG - 龐大軍械庫擴充版</title>
    <style>
        :root { --bg-color: #0b0c10; --text-color: #c5c6c7; --primary-color: #66fcf1; --border-color: #45a29e; --panel-bg: #1f2833; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 800px; background: #111; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .menu-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: var(--panel-bg); color: #fff; border: 1px solid var(--border-color); cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .menu-btn:hover { background: #2c3a49; border-color: var(--primary-color); }
        .stats-box { border: 1px solid var(--border-color); padding: 15px; margin-bottom: 15px; background: #1a1a1d; border-radius: 4px; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .equip-slot { border: 1px solid #555; padding: 10px; background: #222; border-radius: 4px; position: relative; }
        .equip-slot span.slot-name { color: #888; font-size: 0.8em; display: block; margin-bottom: 5px;}
        .effect-text { color: #fca311; font-size: 0.85em; display: block; margin-top: 5px;}
        
        .log-box { height: 250px; overflow-y: auto; border: 1px solid var(--border-color); padding: 12px; background: #000; color: #aaa; margin-bottom: 15px; line-height: 1.6; font-family: monospace; }
        h2, h3 { text-align: center; color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        
        .rarity-common { color: #e0e0e0; }
        .rarity-rare { color: #4cc9f0; }
        .rarity-epic { color: #9d4edd; }
        .rarity-legendary { color: #fca311; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-char" class="screen active">
        <h2>選擇你的英雄</h2>
        <div id="char-selection-list" class="grid-2col"></div>
    </div>

    <div id="screen-hub" class="screen">
        <h2>裝備與狀態面板</h2>
        <div class="stats-box" id="player-hud"></div>
        
        <div class="grid-2col" style="margin-bottom: 15px;">
            <div class="equip-slot"><span class="slot-name">⚔️ 核心武器</span><div id="eq-weapon"></div></div>
            <div class="equip-slot"><span class="slot-name">🪖 頭部防具</span><div id="eq-head"></div></div>
            <div class="equip-slot"><span class="slot-name">🦺 身體防具</span><div id="eq-body"></div></div>
            <div class="equip-slot"><span class="slot-name">🧤 手部防具</span><div id="eq-arms"></div></div>
            <div class="equip-slot"><span class="slot-name">🥾 腿部防具</span><div id="eq-legs"></div></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="menu-btn" onclick="app.randomizeEquip()" style="border-color: #2a9d8f;">🎲 隨機替換全身裝備</button>
            <button class="menu-btn" onclick="app.testCombat()" style="border-color: #e63946;">🔥 進入模擬戰鬥</button>
        </div>
    </div>

    <div id="screen-combat" class="screen">
        <h2>戰鬥日誌 (觀看裝備特效觸發)</h2>
        <div class="log-box" id="combat-log"></div>
        <button class="menu-btn" onclick="app.navigate('screen-hub')">返回裝備庫</button>
    </div>
</div>

class GameApp {
    constructor() {
        this.player = null;
        this.renderCharSelection();
    }

    navigate(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    renderCharSelection() {
        const container = document.getElementById('char-selection-list');
        DB.characters.forEach(char => {
            const btn = document.createElement('div');
            btn.className = 'stats-box'; btn.style.cursor = 'pointer';
            btn.innerHTML = `
                <h3 style="margin:0 0 10px 0;">${char.name}</h3>
                <small>HP: ${char.hp} | MP: ${char.mp}<br>ATK: ${char.atk} | DEF: ${char.def} | SPD: ${char.spd}</small>
            `;
            btn.onclick = () => this.startGame(char);
            container.appendChild(btn);
        });
    }

    startGame(charData) {
        this.player = JSON.parse(JSON.stringify(charData));
        this.randomizeEquip();
        this.navigate('screen-hub');
    }

    // 隨機抽選裝備
    getRandomItem(array) {
        return array[Math.floor(Math.random() * array.length)];
    }

    randomizeEquip() {
        // 隨機選物理或魔法武器
        const isPhys = Math.random() > 0.5;
        const weaponPool = isPhys ? DB.weapons.physical : DB.weapons.magic;
        
        this.player.equip = {
            weapon: this.getRandomItem(weaponPool),
            head: this.getRandomItem(DB.equips.head),
            body: this.getRandomItem(DB.equips.body),
            arms: this.getRandomItem(DB.equips.arms),
            legs: this.getRandomItem(DB.equips.legs)
        };
        this.updateHub();
    }

    getCalculatedStats() {
        let stats = { 
            maxHp: this.player.hp, maxMp: this.player.mp, 
            atk: this.player.atk, def: this.player.def, spd: this.player.spd,
            effects: [] 
        };

        for (const [slot, item] of Object.entries(this.player.equip)) {
            if (!item) continue;
            if (item.def) stats.def += item.def;
            if (item.atk) stats.atk += item.atk;
            if (item.effect) {
                stats.effects.push(item.effect);
                if (item.effect.type === 'atk_up') stats.atk += item.effect.val;
                if (item.effect.type === 'spd_up') stats.spd += item.effect.val;
                if (item.effect.type === 'spd_down') stats.spd += item.effect.val;
                if (item.effect.type === 'hp_up') stats.maxHp += item.effect.val;
                if (item.effect.type === 'max_mp_up') stats.maxMp += item.effect.val;
                if (item.effect.type === 'all_stats') {
                    stats.atk += item.effect.val; stats.def += item.effect.val; stats.spd += item.effect.val;
                }
            }
        }
        return stats;
    }

    updateHub() {
        const stats = this.getCalculatedStats();
        document.getElementById('player-hud').innerHTML = `
            <div class="stat-row"><span>最大 HP: ${stats.maxHp}</span> <span>最大 MP: ${stats.maxMp}</span></div>
            <div class="stat-row"><span>總 ATK: <span style="color:#fca311">${stats.atk}</span></span> <span>總 DEF: <span style="color:#4cc9f0">${stats.def}</span></span> <span>SPD: ${stats.spd}</span></div>
        `;

        const renderEquip = (slotId, item) => {
            const el = document.getElementById(slotId);
            if (!item) return;
            const setTag = item.set ? `<span style="color:#aaa; font-size:0.8em;">[${item.set}套裝]</span> ` : '';
            el.innerHTML = `<strong>${setTag}${item.name}</strong><br><span class="effect-text">★ ${item.effect.desc}</span>`;
        };

        renderEquip('eq-weapon', this.player.equip.weapon);
        renderEquip('eq-head', this.player.equip.head);
        renderEquip('eq-body', this.player.equip.body);
        renderEquip('eq-arms', this.player.equip.arms);
        renderEquip('eq-legs', this.player.equip.legs);
    }

    log(msg) {
        const logBox = document.getElementById('combat-log');
        logBox.innerHTML += `> ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    testCombat() {
        this.navigate('screen-combat');
        document.getElementById('combat-log').innerHTML = '';
        this.log('<span style="color:var(--primary-color);"><strong>--- 啟動虛擬戰鬥訓練模組 ---</strong></span>');
        
        const stats = this.getCalculatedStats();
        let enemyHp = 500;
        let enemyAtk = 45;
        let enemyDef = 20;

        // 1. 回合開始階段
        this.log('<br><strong>【回合準備階段】</strong>');
        stats.effects.forEach(eff => {
            if(eff.type === 'hp_regen') this.log(`<span style="color:#2a9d8f">醫療系統啟動：回復 ${eff.val} HP。</span>`);
            if(eff.type === 'mp_regen') this.log(`<span style="color:#4cc9f0">能量晶體共鳴：回復 ${eff.val} MP。</span>`);
            if(eff.type === 'first_strike') this.log(`<span style="color:#fca311">天弓系統鎖定：本回合傷害提升 50%！</span>`);
            if(eff.type === 'stealth') this.log(`<span style="color:#888">進入光學隱匿狀態，本回合免疫傷害！</span>`);
        });

        // 2. 玩家攻擊階段
        this.log('<br><strong>【玩家射擊/攻擊階段】</strong>');
        let calcAtk = stats.atk;
        let calcEnemyDef = enemyDef;
        let isCrit = false;

        stats.effects.forEach(eff => {
            if(eff.type === 'ignore_def') {
                calcEnemyDef = Math.floor(calcEnemyDef * (1 - eff.val));
                this.log(`<span style="color:#fca311">破甲特效：貫穿敵方裝甲，敵方防禦降至 ${calcEnemyDef}！</span>`);
            }
            if(eff.type === 'crit_chance' && Math.random() < eff.val) isCrit = true;
            if(eff.type === 'two_pass' && Math.random() < 0.2) {
                calcAtk *= 2;
                this.log(`<span style="color:#4cc9f0">SIC/XE 組譯核心：Two-Pass 雙重掃描，觸發二連擊！</span>`);
            }
        });

        let finalDmg = Math.max(1, calcAtk - calcEnemyDef);
        
        if (isCrit) {
            finalDmg = Math.floor(finalDmg * 1.5);
            stats.effects.forEach(e => { if(e.type === 'crit_dmg') finalDmg = Math.floor(finalDmg * (1 + e.val)); });
            this.log(`<span style="color:red; font-weight:bold;">弱點擊破！爆擊造成巨量傷害！</span>`);
        }

        this.log(`武器命中目標，造成 <span style="color:var(--primary-color)">${finalDmg}</span> 點傷害。`);
        enemyHp -= finalDmg;

        stats.effects.forEach(eff => {
            if(eff.type === 'bleed') this.log(`<span style="color:red">流血特效：目標撕裂，受到 ${eff.val} 點傷害。</span>`);
            if(eff.type === 'vampire') this.log(`<span style="color:#2a9d8f">鮮血虹吸：吸收了 ${Math.floor(finalDmg * eff.val)} 點生命。</span>`);
            if(eff.type === 'splash') this.log(`<span style="color:#fca311">濺射判定：對周圍其他目標造成 ${Math.floor(finalDmg * eff.val)} 點波及傷害。</span>`);
        });

        // 3. 敵人反擊階段
        this.log('<br><strong>【敵方反擊階段】</strong>');
        let dmgTaken = Math.max(1, enemyAtk - stats.def);
        let dodged = false;
        let blocked = false;

        let totalDodgeChance = 0;
        stats.effects.forEach(eff => { 
            if(eff.type === 'dodge' || eff.type === 'dodge_up') totalDodgeChance += eff.val; 
            if(eff.type === 'block' && Math.random() < eff.val) blocked = true;
        });

        if (Math.random() < totalDodgeChance) dodged = true;

        if (dodged) {
            this.log(`<span style="color:#4cc9f0; font-weight:bold;">感測器發出警告！極限迴避了敵方火力！</span>`);
            stats.effects.forEach(eff => { if(eff.type === 'counter') this.log(`<span style="color:#fca311">觸發反擊系統！對敵人造成微量傷害。</span>`); });
        } else if (blocked) {
            this.log(`<span style="color:#a8dadc; font-weight:bold;">愛國者攔截系統啟動：完美格擋所有傷害！</span>`);
        } else {
            this.log(`敵方開火，裝甲吸收部分衝擊後，你受到 <span style="color:red">${dmgTaken}</span> 點傷害。`);
            stats.effects.forEach(eff => {
                if(eff.type === 'reflect') {
                    let refDmg = Math.floor(dmgTaken * eff.val);
                    this.log(`<span style="color:#fca311">M1A2T 反應裝甲引爆：反彈 ${refDmg} 點傷害！</span>`);
                }
            });
        }
        
        this.log('<br><span style="color:#888;">--- 模擬結束 ---</span>');
    }
}

const app = new GameApp();
</script>
