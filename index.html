<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字RPG - 時間裂縫 (終極完整版)</title>
    <style>
        :root { --bg-color: #0b0c10; --text-color: #c5c6c7; --primary-color: #66fcf1; --border-color: #45a29e; --panel-bg: #1f2833; --danger-color: #ff4c4c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 600px; background: #111; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); position: relative; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h2, h3 { text-align: center; color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        .menu-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: var(--panel-bg); color: #fff; border: 1px solid var(--border-color); cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .menu-btn:hover:not(:disabled) { background: #2c3a49; border-color: var(--primary-color); }
        .menu-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .stats-box { border: 1px solid var(--border-color); padding: 15px; margin-bottom: 15px; background: #1a1a1d; border-radius: 4px; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .equip-slot { border: 1px solid #555; padding: 8px; background: #222; border-radius: 4px; font-size: 0.9em; }
        .effect-text { color: #fca311; font-size: 0.85em; display: block; margin-top: 5px;}
        
        .log-box { height: 180px; overflow-y: auto; border: 1px solid var(--border-color); padding: 12px; background: #000; color: #aaa; margin-bottom: 15px; line-height: 1.6; font-family: monospace; }
        
        /* 戰鬥目標選擇 UI */
        .enemy-card { border: 2px solid #555; padding: 10px; text-align: center; cursor: pointer; background: #222; border-radius: 4px; transition: 0.2s; }
        .enemy-card:hover { border-color: var(--danger-color); }
        .enemy-card.selected { border-color: var(--danger-color); background: #3a1c1c; box-shadow: 0 0 10px rgba(255, 76, 76, 0.5); }
        .enemy-dead { opacity: 0.3; pointer-events: none; border-color: #333; }

        /* 模態彈窗 (換裝/背包) */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal.active { display: block; }
        .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding: 10px 0; }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- 1. 角色選擇 -->
    <div id="screen-char" class="screen active">
        <h2>選擇初始職業</h2>
        <div id="char-selection-list" class="grid-2col"></div>
    </div>

    <!-- 2. RPG 探索樞紐 (Hub) -->
    <div id="screen-hub" class="screen">
        <h2 style="color:#fca311;">營地整備 - 第 <span id="hub-turn"></span> 回合</h2>
        <div class="stats-box" id="player-hud"></div>
        
        <h3 style="margin-top:0; border:none; color:#aaa; font-size:1em;">當前裝備</h3>
        <div class="grid-2col">
            <div class="equip-slot">⚔️ 武器: <span id="eq-weapon" style="color:var(--primary-color)"></span></div>
            <div class="equip-slot">🪖 頭部: <span id="eq-head" style="color:var(--primary-color)"></span></div>
            <div class="equip-slot">🦺 身體: <span id="eq-body" style="color:var(--primary-color)"></span></div>
            <div class="equip-slot">🥾 腿部: <span id="eq-legs" style="color:var(--primary-color)"></span></div>
        </div>

        <button class="menu-btn" onclick="app.explore()" style="border-left: 5px solid #e63946; font-size:1.1em;">🚪 深入探索裂縫 (推進回合)</button>
        <button class="menu-btn" onclick="app.openBag('hub')" style="border-left: 5px solid #2a9d8f;">🎒 打開背包 (裝備/吃藥)</button>
        <button class="menu-btn" onclick="app.restCamp()" style="border-left: 5px solid #fca311;">⛺ 營地休息 (回復 30% HP/MP)</button>
    </div>

    <!-- 3. 戰鬥介面 -->
    <div id="screen-combat" class="screen">
        <h2 id="combat-title">遭遇戰</h2>
        
        <div class="stats-box" style="padding: 10px;">
            <div class="stat-row"><span>HP: <span id="c-hp" style="color:#ffb3ba;"></span></span> <span>MP: <span id="c-mp" style="color:#a8dadc;"></span></span> <span>SPD: <span id="c-spd"></span></span></div>
            <div class="stat-row"><span>當前武器: <span id="c-weapon" style="color:var(--primary-color);"></span></span> <span>ATK: <span id="c-atk"></span></span></div>
        </div>

        <div class="grid-2col" id="enemy-container"></div>

        <div class="log-box" id="combat-log"></div>

        <!-- 流程圖：準備階段 -->
        <div id="combat-prep-actions" style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="menu-btn" onclick="app.openBag('combat_item')" style="border-color:#2a9d8f; font-size:0.9em;">🎒 使用道具<br><small>(不消耗回合)</small></button>
            <button class="menu-btn" onclick="app.openBag('combat_weapon')" style="border-color:#fca311; font-size:0.9em;">🔄 更換武器<br><small>(會消耗一回合！)</small></button>
        </div>
        
        <!-- 流程圖：攻擊階段 (結束回合) -->
        <button class="menu-btn" id="btn-attack" onclick="app.executeAttack()" style="background-color:#4a0000; border-color:var(--danger-color);" disabled>⚔️ 對選定目標攻擊</button>
    </div>

    <!-- 4. 戰利品結算 -->
    <div id="screen-loot" class="screen">
        <h2>戰鬥勝利</h2>
        <div class="stats-box">
            <p>獲得經驗值: <span id="loot-exp" style="color:var(--primary-color)"></span></p>
            <p id="loot-lvlup" style="color:gold; font-weight:bold; display:none;">🌟 升級了！全屬性提升！</p>
            <hr style="border-color:#333;">
            <h3 style="margin-bottom:5px;">🎁 發現戰利品</h3>
            <div id="loot-item" style="color:#fca311; text-align:center; font-size:1.2em; font-weight:bold;"></div>
        </div>
        <button class="menu-btn" onclick="app.endTurn()">將戰利品收起並返回營地</button>
    </div>

    <!-- 遊戲結束 -->
    <div id="screen-result" class="screen">
        <h1 id="result-title" style="font-size:2.5em;">結算</h1>
        <div class="stats-box" style="text-align:center;">
            <p>存活回合: <span id="res-turn"></span> / 20</p>
            <p>最終等級: <span id="res-lv"></span></p>
        </div>
        <button class="menu-btn" onclick="location.reload()">重新開始</button>
    </div>

    <!-- 背包模態框 -->
    <div id="bag-modal" class="modal">
        <h2 id="bag-title">背包</h2>
        <div id="bag-list" class="stats-box" style="min-height: 200px; max-height: 400px; overflow-y:auto; background:#111;"></div>
        <button class="menu-btn" onclick="document.getElementById('bag-modal').classList.remove('active'); app.updateCombatUI();">關閉背包</button>
    </div>
</div>

<script>
/**
 * 濃縮版軍械庫
 */
const DB = {
    characters: [
        { id: 'c1', name: '重甲兵', hp: 200, mp: 30, atk: 12, def: 10, spd: 5, startWeapon: '制式軍用匕首' },
        { id: 'c2', name: '夜行刺客', hp: 120, mp: 50, atk: 15, def: 4, spd: 20, startWeapon: '制式軍用匕首' },
        { id: 'c3', name: '秘法使', hp: 90, mp: 120, atk: 8, def: 3, spd: 12, startWeapon: '學徒法杖' }
    ],
    items: [ // 總掉落池
        { cat: 'weapon', id: 'w1', name: '制式軍用匕首', atk: 8, effect: { type: 'spd_up', val: 5, desc: '速度+5' } },
        { cat: 'weapon', id: 'w2', name: '高頻震盪刀', atk: 25, effect: { type: 'bleed', val: 10, desc: '流血+10' } },
        { cat: 'weapon', id: 'w3', name: '戰術散彈槍', atk: 35, effect: { type: 'splash', val: 0.3, desc: '濺射30%' } },
        { cat: 'weapon', id: 'w4', name: '學徒法杖', atk: 12, effect: { type: 'mp_regen', val: 5, desc: '回魔+5' } },
        { cat: 'weapon', id: 'w5', name: 'SIC/XE 組譯核心', atk: 28, effect: { type: 'two_pass', val: 2, desc: '機率二連擊' } },
        { cat: 'head', id: 'h1', name: '標準鋼盔', def: 5, effect: { type: 'hp_up', val: 30, desc: '最大HP+30' } },
        { cat: 'head', id: 'h2', name: 'F-35 感知頭盔', def: 8, effect: { type: 'dodge', val: 0.2, desc: '閃避率+20%' } },
        { cat: 'body', id: 'b1', name: '防彈背心', def: 12, effect: { type: 'dmg_reduce', val: 0.1, desc: '受傷減免10%' } },
        { cat: 'body', id: 'b2', name: 'M1A2T 反應裝甲', def: 25, effect: { type: 'reflect', val: 0.3, desc: '反彈30%傷害' } },
        { cat: 'legs', id: 'l1', name: '軍用戰鬥靴', def: 6, effect: { type: 'spd_up', val: 8, desc: '速度+8' } },
        { cat: 'legs', id: 'l2', name: '氣墊推進靴', def: 4, effect: { type: 'spd_up', val: 15, desc: '速度+15' } },
        { cat: 'item', id: 'i1', name: '全效醫療箱', type: 'heal', effect: { hp: 100, mp: 50 }, desc: '回復 100HP/50MP' },
        { cat: 'item', id: 'i2', name: '爪哇咖啡豆', type: 'heal', effect: { mp: 80 }, desc: '回復 80MP' },
        { cat: 'item', id: 'i3', name: '戰術破片手雷', type: 'dmg', effect: { dmg: 100 }, desc: '造成 100 真實傷害' }
    ]
};

class GameApp {
    constructor() {
        this.player = null;
        this.enemies = [];
        this.turn = 1;
        this.selectedTargetId = null;
        this.renderCharSelection();
    }

    navigate(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    log(msg) {
        const logBox = document.getElementById('combat-log');
        logBox.innerHTML += `> ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- 遊戲初始化與 Hub ---
    renderCharSelection() {
        const container = document.getElementById('char-selection-list');
        DB.characters.forEach(char => {
            const btn = document.createElement('div');
            btn.className = 'stats-box'; btn.style.cursor = 'pointer';
            btn.innerHTML = `<h3>${char.name}</h3><small>HP: ${char.hp} | MP: ${char.mp}<br>ATK: ${char.atk} | DEF: ${char.def} | SPD: ${char.spd}</small>`;
            btn.onclick = () => this.startGame(char);
            container.appendChild(btn);
        });
    }

    startGame(charData) {
        this.player = JSON.parse(JSON.stringify(charData));
        this.player.lv = 1; this.player.exp = 0; this.player.expNeeded = 50;
        
        // 初始裝備與背包
        const startWeapon = DB.items.find(i => i.name === charData.startWeapon);
        this.player.equip = { weapon: startWeapon, head: null, body: null, legs: null };
        this.player.inventory = [
            {...DB.items.find(i => i.id === 'i1'), count: 2}, // 給兩包補血
            {...DB.items.find(i => i.id === 'w3'), count: 1}  // 給一把散彈槍當備用武器
        ];
        
        this.updateHub();
        this.navigate('screen-hub');
    }

    getStats() {
        let s = { maxHp: this.player.hp, maxMp: this.player.mp, atk: this.player.atk, def: this.player.def, spd: this.player.spd, effects: [] };
        for (const [slot, item] of Object.entries(this.player.equip)) {
            if (!item) continue;
            if (item.atk) s.atk += item.atk; if (item.def) s.def += item.def;
            if (item.effect) {
                s.effects.push(item.effect);
                if (item.effect.type === 'hp_up') s.maxHp += item.effect.val;
                if (item.effect.type === 'spd_up') s.spd += item.effect.val;
            }
        }
        return s;
    }

    updateHub() {
        const s = this.getStats();
        // 確保目前血量不超過上限，且開局補滿
        if(this.player.currentHp === undefined) { this.player.currentHp = s.maxHp; this.player.currentMp = s.maxMp; }
        
        document.getElementById('hub-turn').innerText = this.turn;
        document.getElementById('player-hud').innerHTML = `
            <div class="stat-row"><span>Lv: ${this.player.lv} (EXP: ${this.player.exp}/${this.player.expNeeded})</span> <span>HP: <span style="color:#ffb3ba">${this.player.currentHp}/${s.maxHp}</span></span></div>
            <div class="stat-row"><span>MP: <span style="color:#a8dadc">${this.player.currentMp}/${s.maxMp}</span></span> <span>ATK: ${s.atk} | DEF: ${s.def} | SPD: ${s.spd}</span></div>
        `;
        document.getElementById('eq-weapon').innerText = this.player.equip.weapon ? this.player.equip.weapon.name : '無';
        document.getElementById('eq-head').innerText = this.player.equip.head ? this.player.equip.head.name : '無';
        document.getElementById('eq-body').innerText = this.player.equip.body ? this.player.equip.body.name : '無';
        document.getElementById('eq-legs').innerText = this.player.equip.legs ? this.player.equip.legs.name : '無';
    }

    restCamp() {
        const s = this.getStats();
        this.player.currentHp = Math.min(s.maxHp, this.player.currentHp + Math.floor(s.maxHp * 0.3));
        this.player.currentMp = Math.min(s.maxMp, this.player.currentMp + Math.floor(s.maxMp * 0.3));
        alert('營地休息：恢復 30% HP 與 MP。');
        this.endTurn();
    }

    // --- 背包系統 (營地/戰鬥共用) ---
    openBag(context) {
        document.getElementById('bag-modal').classList.add('active');
        const list = document.getElementById('bag-list');
        list.innerHTML = '';
        
        let displayItems = this.player.inventory;
        if (context === 'combat_item') displayItems = displayItems.filter(i => i.cat === 'item');
        if (context === 'combat_weapon') displayItems = displayItems.filter(i => i.cat === 'weapon');
        if (context === 'hub') document.getElementById('bag-title').innerText = '背包 (點擊裝備/使用)';
        else document.getElementById('bag-title').innerText = context === 'combat_weapon' ? '更換武器 (將消耗一回合)' : '使用道具 (不消耗回合)';

        if (displayItems.length === 0) { list.innerHTML = '<p style="text-align:center;">空空如也</p>'; return; }

        displayItems.forEach((item, index) => {
            const row = document.createElement('div'); row.className = 'item-row';
            let btnText = item.cat === 'item' ? '使用' : '裝備';
            row.innerHTML = `
                <div><strong style="color:var(--primary-color)">${item.name}</strong> ${item.count ? 'x'+item.count : ''}<br><small>${item.desc || item.effect.desc}</small></div>
                <button class="menu-btn" style="width:auto; padding:5px 15px; margin:0;" onclick="app.useItem(${index}, '${context}')">${btnText}</button>
            `;
            list.appendChild(row);
        });
    }

    useItem(invIndex, context) {
        const item = this.player.inventory[invIndex];
        const s = this.getStats();

        if (item.cat === 'item') {
            if(item.type === 'heal') {
                if(item.effect.hp) this.player.currentHp = Math.min(s.maxHp, this.player.currentHp + item.effect.hp);
                if(item.effect.mp) this.player.currentMp = Math.min(s.maxMp, this.player.currentMp + item.effect.mp);
                if(context.includes('combat')) this.log(`🎒 使用了 ${item.name}！ (回合繼續)`);
                else alert(`使用了 ${item.name}`);
            } else if (item.type === 'dmg' && context.includes('combat')) {
                // 手雷直接炸全體
                this.enemies.forEach(e => { if(!e.isDead) e.hp -= item.effect.dmg; });
                this.log(`🎒 投擲 ${item.name}！造成 ${item.effect.dmg} 範圍傷害！ (回合繼續)`);
                this.checkEnemyDeath();
            } else {
                alert('無法在非戰鬥狀態使用傷害道具！'); return;
            }
            // 扣除數量
            item.count--;
            if(item.count <= 0) this.player.inventory.splice(invIndex, 1);
        } else {
            // 裝備切換邏輯
            let slot = item.cat;
            let currentEquip = this.player.equip[slot];
            this.player.equip[slot] = item;
            this.player.inventory.splice(invIndex, 1);
            if(currentEquip) this.player.inventory.push(currentEquip);
            
            // 戰鬥中換武器：結束回合機制
            if(context.includes('combat')) {
                this.log(`🔄 手忙腳亂地將武裝切換為：<span style="color:var(--primary-color)">[${item.name}]</span> (消耗了本回合)`);
                document.getElementById('combat-prep-actions').style.display = 'none';
                document.getElementById('btn-attack').disabled = true;
                
                // 關閉背包後，直接移交回合給敵人
                document.getElementById('bag-modal').classList.remove('active');
                this.updateCombatUI();
                setTimeout(() => this.startEnemyTurn(), 800);
                return; // 提早 return 避免跑下面的 updateCombatUI 覆蓋邏輯
            }
        }

        // 重新渲染畫面
        document.getElementById('bag-modal').classList.remove('active');
        if (context === 'hub') this.updateHub();
        else this.updateCombatUI(); 
    }

    // --- 戰鬥系統 ---
    explore() {
        this.navigate('screen-combat');
        document.getElementById('combat-log').innerHTML = '';
        this.selectedTargetId = null;

        // 生成敵人
        let scale = this.turn;
        let isBoss = (scale === 10 || scale === 20);
        document.getElementById('combat-title').innerText = isBoss ? "⚠️ 裂縫守門人 Boss ⚠️" : "遭遇戰";
        
        this.enemies = [];
        let enemyCount = isBoss ? 1 : Math.floor(Math.random() * 2) + 1; // 1~2 隻怪
        for(let i=0; i<enemyCount; i++) {
            this.enemies.push({
                id: i, name: isBoss ? '異星巨獸' : ['機械衛兵', '虛空蟲'][Math.floor(Math.random()*2)],
                maxHp: isBoss ? 300+scale*20 : 50+scale*10, hp: isBoss ? 300+scale*20 : 50+scale*10,
                atk: isBoss ? 25+scale*2 : 10+scale, def: isBoss ? 15 : 5, spd: isBoss ? 8 : 10+Math.floor(Math.random()*10),
                isDead: false, exp: isBoss ? 150 : 30
            });
        }
        
        this.updateCombatUI();
        this.log('<strong>戰鬥開始！</strong>');
        
        // 判定先攻
        const maxEnemySpd = Math.max(...this.enemies.map(e=>e.spd));
        const pSpd = this.getStats().spd;
        if (pSpd >= maxEnemySpd) {
            this.log(`<span style="color:var(--primary-color)">你的速度(${pSpd}) 快於敵人(${maxEnemySpd})，取得先攻！</span>`);
            this.startPlayerTurn();
        } else {
            this.log(`<span style="color:var(--danger-color)">敵人速度(${maxEnemySpd}) 較快，遭到突襲！</span>`);
            this.startEnemyTurn();
        }
    }

    updateCombatUI() {
        const s = this.getStats();
        document.getElementById('c-hp').innerText = `${this.player.currentHp}/${s.maxHp}`;
        document.getElementById('c-mp').innerText = `${this.player.currentMp}/${s.maxMp}`;
        document.getElementById('c-spd').innerText = s.spd;
        document.getElementById('c-weapon').innerText = this.player.equip.weapon.name;
        document.getElementById('c-atk').innerText = s.atk;

        const container = document.getElementById('enemy-container');
        container.innerHTML = '';
        this.enemies.forEach(e => {
            const div = document.createElement('div');
            div.className = `enemy-card ${e.isDead ? 'enemy-dead' : ''} ${this.selectedTargetId === e.id ? 'selected' : ''}`;
            div.innerHTML = `<strong>${e.name}</strong><br><span style="color:#ffb3ba;">HP: ${e.hp}/${e.maxHp}</span><br><small>SPD: ${e.spd} | DEF: ${e.def}</small>`;
            if (!e.isDead && !document.getElementById('btn-attack').disabled) {
                div.onclick = () => {
                    this.selectedTargetId = e.id;
                    this.updateCombatUI(); // 刷新高亮
                };
            }
            container.appendChild(div);
        });
        
        // 控制攻擊按鈕狀態 (如果是敵方回合，強制 disable)
        if(document.getElementById('combat-prep-actions').style.display !== 'none') {
             document.getElementById('btn-attack').disabled = (this.selectedTargetId === null);
        }
    }

    startPlayerTurn() {
        this.selectedTargetId = null;
        document.getElementById('combat-prep-actions').style.display = 'flex'; 
        document.getElementById('btn-attack').disabled = true;
        this.log('<br>【你的回合】請進行戰術調整，或選擇目標進行攻擊。');
        this.updateCombatUI();
    }

    executeAttack() {
        const target = this.enemies.find(e => e.id === this.selectedTargetId);
        if(!target) return;
        
        const s = this.getStats();
        let dmg = s.atk;
        
        // 計算武器特效
        let isSplash = false;
        let isTwoPass = false;
        s.effects.forEach(eff => {
            if(eff.type === 'two_pass' && Math.random() < 0.3) isTwoPass = true;
            if(eff.type === 'splash') isSplash = true;
        });

        // 攻擊函數
        const hitTarget = (t, multiplier=1) => {
            let actualDmg = Math.max(1, Math.floor(dmg * multiplier) - t.def);
            t.hp -= actualDmg;
            this.log(`⚔️ 對 ${t.name} 造成 <span style="color:var(--primary-color)">${actualDmg}</span> 傷害！`);
            s.effects.forEach(eff => {
                if(eff.type === 'bleed') { t.hp -= eff.val; this.log(`<span style="color:red">└ 流血追加 ${eff.val} 傷害。</span>`); }
            });
        };

        hitTarget(target);
        if(isTwoPass) { this.log('<span style="color:#fca311">⚡ Two-Pass 核心觸發！追加第二擊！</span>'); hitTarget(target); }
        if(isSplash) {
            this.log('<span style="color:#fca311">💥 散彈濺射！波及其他目標！</span>');
            this.enemies.forEach(e => { if(e.id !== target.id && !e.isDead) hitTarget(e, 0.3); });
        }

        document.getElementById('combat-prep-actions').style.display = 'none';
        document.getElementById('btn-attack').disabled = true;
        this.updateCombatUI();
        
        if (!this.checkEnemyDeath()) {
            // 沒死光就換敵人
            setTimeout(() => this.startEnemyTurn(), 800);
        }
    }

    checkEnemyDeath() {
        let allDead = true;
        let totalExp = 0;
        this.enemies.forEach(e => {
            if (e.hp <= 0 && !e.isDead) {
                e.hp = 0; e.isDead = true; totalExp += e.exp;
                this.log(`💀 <strong>${e.name} 被擊破！</strong>`);
            }
            if (!e.isDead) allDead = false;
        });
        
        this.updateCombatUI();

        if (allDead) {
            setTimeout(() => this.showLoot(totalExp), 1000);
            return true;
        }
        return false;
    }

    startEnemyTurn() {
        this.log('<br>【敵方回合】');
        const s = this.getStats();
        let dodgeChance = 0; let dmgReduce = 0; let reflect = 0;
        s.effects.forEach(e => {
            if(e.type === 'dodge') dodgeChance += e.val;
            if(e.type === 'dmg_reduce') dmgReduce += e.val;
            if(e.type === 'reflect') reflect += e.val;
        });

        this.enemies.forEach(e => {
            if (!e.isDead) {
                if (Math.random() < dodgeChance) {
                    this.log(`<span style="color:#4cc9f0">你驚險地閃避了 ${e.name} 的攻擊！</span>`);
                } else {
                    let eDmg = Math.max(1, e.atk - s.def);
                    eDmg = Math.floor(eDmg * (1 - dmgReduce));
                    this.player.currentHp -= eDmg;
                    this.log(`> ${e.name} 攻擊！造成 <span style="color:var(--danger-color)">${eDmg}</span> 傷害。`);
                    
                    if (reflect > 0) {
                        let rDmg = Math.floor(eDmg * reflect);
                        e.hp -= rDmg;
                        this.log(`<span style="color:#fca311">└ 裝甲反彈了 ${rDmg} 傷害給 ${e.name}！</span>`);
                        this.checkEnemyDeath(); // 可能被彈死
                    }
                }
            }
        });

        this.updateCombatUI();
        if (this.player.currentHp <= 0) {
            this.player.currentHp = 0;
            this.navigate('screen-result');
            document.getElementById('result-title').innerText = "你已陣亡...";
            document.getElementById('result-title').style.color = "var(--danger-color)";
            document.getElementById('res-turn').innerText = this.turn;
            document.getElementById('res-lv').innerText = this.player.lv;
        } else {
            setTimeout(() => this.startPlayerTurn(), 800);
        }
    }

    // --- 掉落結算與推進 ---
    showLoot(exp) {
        this.navigate('screen-loot');
        document.getElementById('loot-exp').innerText = exp;
        
        // 經驗值結算
        this.player.exp += exp;
        let leveled = false;
        while(this.player.exp >= this.player.expNeeded) {
            this.player.exp -= this.player.expNeeded;
            this.player.lv++;
            this.player.atk += 2; this.player.def += 1;
            this.player.expNeeded = Math.floor(this.player.expNeeded * 1.5);
            leveled = true;
        }
        document.getElementById('loot-lvlup').style.display = leveled ? 'block' : 'none';

        // 抽取隨機戰利品放入背包
        const dropItem = DB.items[Math.floor(Math.random() * DB.items.length)];
        document.getElementById('loot-item').innerText = dropItem.name;
        
        // 堆疊或新增到背包
        let exist = this.player.inventory.find(i => i.id === dropItem.id);
        if (exist && dropItem.cat === 'item') exist.count++; // 消耗品堆疊
        else this.player.inventory.push({...dropItem, count: dropItem.cat === 'item' ? 1 : null}); 
    }

    endTurn() {
        this.turn++;
        if(this.turn > 20) {
            this.navigate('screen-result');
            document.getElementById('result-title').innerText = "恭喜通關！裂縫已關閉";
            document.getElementById('result-title').style.color = "var(--primary-color)";
            document.getElementById('res-turn').innerText = "20";
            document.getElementById('res-lv').innerText = this.player.lv;
            return;
        }
        this.updateHub();
        this.navigate('screen-hub');
    }
}

const app = new GameApp();
</script>
